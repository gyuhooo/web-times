<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Timecode Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@100..700&family=JetBrains+Mono:wght@100..800&family=IBM+Plex+Mono:wght@100;200;300;400;500;600;700&family=Inter:wght@100..900&family=Oswald:wght@200..700&display=swap" />
<style>
  :root {
    --tc-color: #ffffff;
    --tc-bg: rgba(0, 0, 0, 0);
    --tc-size: 12vw;
    --tc-font: 'Roboto Mono', monospace;
    --tc-weight: 700;
    --tc-shadow: 0 0 0 rgba(0,0,0,0);
    --tc-letter: 0.02em;
    --tc-opacity: 1;
    --pg-h: 1.2vw;
    --tc-panel-bg: transparent;
    --tc-panel-pad: 0;
    --tc-panel-radius: 0;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--tc-bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  body.show-checker {
    background-color: #2b2b2b;
    background-image:
      linear-gradient(45deg, #3a3a3a 25%, transparent 25%),
      linear-gradient(-45deg, #3a3a3a 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #3a3a3a 75%),
      linear-gradient(-45deg, transparent 75%, #3a3a3a 75%);
    background-size: 32px 32px;
    background-position: 0 0, 0 16px, 16px -16px, -16px 0;
  }

  #stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3vmin;
    user-select: none;
  }
  #stage.v-top    { align-items: flex-start; }
  #stage.v-center { align-items: center; }
  #stage.v-bottom { align-items: flex-end; }
  #stage.h-left   { justify-content: flex-start; }
  #stage.h-center { justify-content: center; }
  #stage.h-right  { justify-content: flex-end; }

  #clock {
    color: var(--tc-color);
    font-family: var(--tc-font);
    font-size: var(--tc-size);
    font-weight: var(--tc-weight);
    letter-spacing: var(--tc-letter);
    line-height: 1;
    text-align: center;
    text-shadow: var(--tc-shadow);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    opacity: var(--tc-opacity);
    background: var(--tc-panel-bg);
    padding: var(--tc-panel-pad);
    border-radius: var(--tc-panel-radius);
  }

  #clock .frames,
  #clock .ms {
    opacity: 0.75;
    font-size: 0.6em;
    vertical-align: baseline;
  }

  /* 時計とプログレスバーをまとめる箱（バーは時計幅にそろう） */
  #group {
    display: inline-flex;
    flex-direction: column;
    align-items: stretch;
    gap: 0.35em;
  }
  #progress {
    display: none;
    height: var(--pg-h, 1.2vw);
    background: rgba(255, 255, 255, 0.18);
    border-radius: 999px;
    overflow: hidden;
  }
  #progress.on { display: block; }
  #progressFill {
    height: 100%;
    width: 100%;
    background: #33aaff;
    border-radius: 999px;
    transition: width 0.12s linear;
  }

  /* 数字を等幅化: 各桁を 1ch 幅のセルに収め、どのフォントでも桁が動かない */
  #clock .d {
    display: inline-block;
    width: 1ch;
    text-align: center;
  }

  #clock .date,
  #clock .cd-title {
    display: block;
    font-size: 0.32em;
    opacity: 0.85;
    margin-bottom: 0.15em;
    letter-spacing: 0.05em;
  }

  /* コロン点滅: 有効時のみ、毎秒トグルされる .blink-off で : を消す */
  #clock .sep { transition: opacity 0.06s linear; }
  body.blink-on #clock.blink-off .sep { opacity: 0; }

  /* タイマー終了時のフラッシュ */
  #clock.finished-flash { animation: tc-flash 0.7s steps(1) infinite; }
  @keyframes tc-flash { 50% { opacity: 0.12; } }

  /* ---------- 設定パネル ---------- */
  #panel {
    position: fixed;
    top: 0;
    right: 0;
    height: 100%;
    width: 340px;
    max-width: 90vw;
    background: rgba(20, 22, 26, 0.96);
    color: #e8e8e8;
    transform: translateX(100%);
    visibility: hidden;
    transition: transform 0.25s ease, visibility 0s linear 0.25s;
    z-index: 10;
    overflow-y: auto;
    padding: 18px 20px 60px;
    font-size: 14px;
  }
  #panel.open {
    transform: translateX(0);
    visibility: visible;
    box-shadow: -4px 0 24px rgba(0, 0, 0, 0.5);
    transition: transform 0.25s ease, visibility 0s;
  }

  #panel h1 {
    font-size: 16px;
    margin: 0 0 4px;
    font-weight: 600;
  }
  #panel .hint {
    font-size: 12px;
    color: #9aa0a6;
    margin: 0 0 16px;
  }
  #panel hr {
    border: none;
    border-top: 1px solid #2f333a;
    margin: 18px 0;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    margin-bottom: 6px;
    color: #c4c8cc;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .field input[type="text"],
  .field input[type="datetime-local"],
  .field select,
  .field input[type="number"] {
    width: 100%;
    padding: 7px 9px;
    background: #2a2d33;
    border: 1px solid #3a3f47;
    border-radius: 6px;
    color: #f0f0f0;
    font-size: 14px;
  }
  .field input[type="color"] {
    width: 100%;
    height: 38px;
    padding: 2px;
    background: #2a2d33;
    border: 1px solid #3a3f47;
    border-radius: 6px;
    cursor: pointer;
  }
  .field input[type="range"] { width: 100%; }

  .row { display: flex; gap: 10px; }
  .row > .field { flex: 1; }

  .checkbox {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .checkbox input { width: 16px; height: 16px; }
  .checkbox label { margin: 0; text-transform: none; letter-spacing: 0; font-size: 14px; color: #e8e8e8; }

  .val { float: right; color: #9aa0a6; font-weight: 400; }

  .btn-row { display: flex; gap: 8px; margin-top: 8px; margin-bottom: 8px; }
  button.action {
    flex: 1;
    padding: 9px;
    border: 1px solid #3a3f47;
    border-radius: 6px;
    background: #2f333a;
    color: #f0f0f0;
    cursor: pointer;
    font-size: 13px;
  }
  button.action:hover { background: #3a3f47; }

  .lap-list {
    max-height: 150px;
    overflow-y: auto;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    margin-top: 6px;
  }
  .lap-list .lap {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    padding: 3px 6px;
    border-bottom: 1px solid #2a2d33;
    color: #d0d4d8;
  }
  .lap-list .lap .lap-n { color: #9aa0a6; }

  #syncStatus { margin: 0 0 8px; }

  /* メニュー（ハンバーガー）ボタン */
  #gear {
    position: fixed;
    top: 12px;
    right: 16px;
    border: none;
    background: none;
    padding: 4px;
    color: #fff;
    font-size: 26px;
    line-height: 1;
    cursor: pointer;
    z-index: 11;
    opacity: 0;
    transition: opacity 0.2s;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
  }
  body:hover #gear { opacity: 0.85; }
  #gear:hover { opacity: 1 !important; }
  #panel.open ~ #gear { opacity: 1; }

  .swatches { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .swatch {
    width: 24px; height: 24px; border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.2); cursor: pointer;
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="group">
      <div id="clock">00:00:00</div>
      <div id="progress"><div id="progressFill"></div></div>
    </div>
  </div>

  <button id="gear" title="メニュー (S キー)">☰</button>

  <div id="panel">
    <h1>時計 / タイムコード</h1>
    <p class="hint">設定はこのブラウザに保存されます。OBSにはこのパネルは映りません（S キーで開閉）。</p>

    <!-- ===== モード ===== -->
    <div class="field">
      <label>モード</label>
      <select id="mode">
        <option value="clock">時計</option>
        <option value="timer">タイマー（カウントダウン）</option>
        <option value="stopwatch">ストップウォッチ</option>
        <option value="countdown">イベントまでの残り時間</option>
      </select>
    </div>

    <!-- ===== 時計モード ===== -->
    <div id="clockFields">
      <div class="field">
        <label>表示形式</label>
        <select id="format">
          <option value="HMS">時:分:秒 (HH:MM:SS)</option>
          <option value="HMSms" selected>時:分:秒.小数</option>
          <option value="HMSf">時:分:秒:フレーム (タイムコード)</option>
          <option value="HM">時:分 (HH:MM)</option>
        </select>
      </div>

      <div class="row" id="fpsRow" style="display:none;">
        <div class="field">
          <label>フレームレート (fps)</label>
          <input type="number" id="fps" min="1" max="120" step="1" value="30" />
        </div>
      </div>

      <div class="field" id="decimalsField" style="display:none;">
        <label>小数点以下の桁数</label>
        <select id="decimals">
          <option value="1">1桁 (0.1秒)</option>
          <option value="2">2桁 (0.01秒)</option>
          <option value="3" selected>3桁 (ミリ秒)</option>
        </select>
      </div>

      <div class="field">
        <label>タイムゾーン</label>
        <select id="tz">
          <option value="auto">ローカル (自動)</option>
          <option value="UTC">UTC</option>
          <option value="Asia/Tokyo">東京 (Asia/Tokyo)</option>
          <option value="Asia/Shanghai">上海 (Asia/Shanghai)</option>
          <option value="Asia/Kolkata">インド (Asia/Kolkata)</option>
          <option value="Europe/London">ロンドン (Europe/London)</option>
          <option value="Europe/Paris">パリ (Europe/Paris)</option>
          <option value="America/New_York">NY (America/New_York)</option>
          <option value="America/Chicago">シカゴ (America/Chicago)</option>
          <option value="America/Los_Angeles">LA (America/Los_Angeles)</option>
          <option value="Australia/Sydney">シドニー (Australia/Sydney)</option>
        </select>
      </div>

      <div class="checkbox">
        <input type="checkbox" id="hour24" checked />
        <label for="hour24">24時間表示</label>
      </div>
      <div class="checkbox">
        <input type="checkbox" id="padHour" checked />
        <label for="padHour">時の先頭に0をつける (09:05)</label>
      </div>
      <div class="checkbox">
        <input type="checkbox" id="showDate" />
        <label for="showDate">日付も表示</label>
      </div>
      <div class="field" id="dateFormatField" style="display:none;">
        <label>日付の形式</label>
        <select id="dateFormat">
          <option value="iso">2026-06-26 (金)</option>
          <option value="mdslash">06/26</option>
          <option value="jp">6月26日(金)</option>
          <option value="jplong">2026年6月26日</option>
          <option value="enshort">Fri, Jun 26</option>
        </select>
      </div>
    </div>

    <!-- ===== タイマー ===== -->
    <div id="timerFields" style="display:none;">
      <div class="row">
        <div class="field"><label>時</label><input type="number" id="timerH" min="0" max="99" step="1" value="0" /></div>
        <div class="field"><label>分</label><input type="number" id="timerM" min="0" max="59" step="1" value="5" /></div>
        <div class="field"><label>秒</label><input type="number" id="timerS" min="0" max="59" step="1" value="0" /></div>
      </div>
      <div class="btn-row">
        <button class="action" id="timerStart">開始</button>
        <button class="action" id="timerPause">一時停止</button>
        <button class="action" id="timerReset">リセット</button>
      </div>
      <div class="checkbox"><input type="checkbox" id="timerShowMs" /><label for="timerShowMs">ミリ秒を表示</label></div>
      <div class="checkbox"><input type="checkbox" id="timerFinishFlash" checked /><label for="timerFinishFlash">終了時に点滅</label></div>
      <div class="checkbox"><input type="checkbox" id="timerBeep" /><label for="timerBeep">終了時にビープ音（要クリック許可）</label></div>
      <div class="field"><label>終了メッセージ（空欄で非表示）</label><input type="text" id="timerFinishLabel" value="TIME!" /></div>

      <div class="row">
        <div class="field"><label>黄色になる残り秒</label><input type="number" id="timerWarnY" min="0" step="1" value="60" /></div>
        <div class="field"><label>赤になる残り秒</label><input type="number" id="timerWarnR" min="0" step="1" value="10" /></div>
      </div>
      <div class="row">
        <div class="field"><label>注意色（黄）</label><input type="color" id="timerColorY" value="#ffcc00" /></div>
        <div class="field"><label>警告/終了色（赤）</label><input type="color" id="timerFinishColor" value="#ff3366" /></div>
      </div>
      <div class="checkbox"><input type="checkbox" id="timerOvertime" checked /><label for="timerOvertime">0:00以降も超過時間を「+」でカウント</label></div>

      <div class="checkbox"><input type="checkbox" id="progressBar" checked /><label for="progressBar">プログレスバーを表示</label></div>
      <div class="row" id="progressOpts">
        <div class="field"><label>バーの色</label><input type="color" id="progressColor" value="#33aaff" /></div>
        <div class="field"><label>バーの太さ <span class="val" id="progressThickVal">1.2</span></label><input type="range" id="progressThick" min="0.2" max="5" step="0.1" value="1.2" /></div>
      </div>

      <p class="hint">残り時間で色が緑→黄→赤に変化。ショートカット（パネルを閉じた状態）: Space=開始/一時停止, R=リセット</p>
    </div>

    <!-- ===== ストップウォッチ ===== -->
    <div id="swFields" style="display:none;">
      <div class="btn-row">
        <button class="action" id="swStart">開始</button>
        <button class="action" id="swPause">一時停止</button>
        <button class="action" id="swReset">リセット</button>
      </div>
      <div class="btn-row"><button class="action" id="swLap">ラップ</button></div>
      <div class="checkbox"><input type="checkbox" id="swShowMs" checked /><label for="swShowMs">ミリ秒を表示</label></div>
      <div class="field">
        <label>ラップ <span class="val" id="swLapCount">0</span></label>
        <div id="swLapList" class="lap-list"></div>
      </div>
      <p class="hint">ショートカット（パネルを閉じた状態）: Space=開始/一時停止, L=ラップ, R=リセット</p>
    </div>

    <!-- ===== イベントカウントダウン ===== -->
    <div id="cdFields" style="display:none;">
      <div class="field"><label>目標日時</label><input type="datetime-local" id="target" /></div>
      <div class="field"><label>タイトル（上に表示）</label><input type="text" id="cdTitle" placeholder="例: 配信開始まで" /></div>
      <div class="field"><label>到達時のメッセージ（空ならタイトル）</label><input type="text" id="cdDone" placeholder="例: START!" /></div>
      <div class="checkbox"><input type="checkbox" id="cdDropDays" checked /><label for="cdDropDays">残り0日のとき「日」を隠す</label></div>
    </div>

    <hr />

    <!-- ===== 見た目（全モード共通） ===== -->
    <div class="field">
      <label>文字色</label>
      <input type="color" id="color" value="#ffffff" />
      <div class="swatches">
        <span class="swatch" data-c="#ffffff" style="background:#ffffff"></span>
        <span class="swatch" data-c="#000000" style="background:#000000"></span>
        <span class="swatch" data-c="#00ff66" style="background:#00ff66"></span>
        <span class="swatch" data-c="#ff3366" style="background:#ff3366"></span>
        <span class="swatch" data-c="#33aaff" style="background:#33aaff"></span>
        <span class="swatch" data-c="#ffcc00" style="background:#ffcc00"></span>
      </div>
    </div>

    <div class="field">
      <label>文字サイズ <span class="val" id="sizeVal">12</span></label>
      <input type="range" id="size" min="2" max="40" step="0.5" value="12" />
    </div>

    <div class="field">
      <label>フォント</label>
      <select id="font">
        <optgroup label="Webフォント">
          <option value="'Roboto Mono', monospace" selected>Roboto Mono（等幅）</option>
          <option value="'JetBrains Mono', monospace">JetBrains Mono（等幅）</option>
          <option value="'IBM Plex Mono', monospace">IBM Plex Mono（等幅）</option>
          <option value="'Inter', sans-serif">Inter</option>
          <option value="'Oswald', sans-serif">Oswald（細長）</option>
        </optgroup>
        <optgroup label="システムフォント">
          <option value="'Courier New', monospace">Courier (等幅)</option>
          <option value="'Consolas', monospace">Consolas</option>
          <option value="'SF Mono', ui-monospace, monospace">SF Mono</option>
          <option value="-apple-system, 'Segoe UI', Roboto, sans-serif">System Sans</option>
          <option value="'Arial Black', sans-serif">Arial Black</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="'Impact', sans-serif">Impact</option>
        </optgroup>
      </select>
    </div>

    <div class="checkbox">
      <input type="checkbox" id="monoDigits" checked />
      <label for="monoDigits">数字の幅を固定（等幅化・桁が動かない）</label>
    </div>

    <div class="field">
      <label>太さ <span class="val" id="weightVal">700</span></label>
      <input type="range" id="weight" min="100" max="900" step="100" value="700" />
    </div>

    <div class="field">
      <label>文字間隔 <span class="val" id="letterVal">0.02</span></label>
      <input type="range" id="letter" min="-0.05" max="0.4" step="0.01" value="0.02" />
    </div>

    <div class="field">
      <label>文字の透明度 <span class="val" id="opacityVal">1</span></label>
      <input type="range" id="opacity" min="0.1" max="1" step="0.05" value="1" />
    </div>

    <div class="checkbox">
      <input type="checkbox" id="blink" />
      <label for="blink">「:」を1秒ごとに点滅</label>
    </div>

    <div class="row">
      <div class="field">
        <label>縦位置</label>
        <select id="alignV"><option value="top">上</option><option value="center" selected>中央</option><option value="bottom">下</option></select>
      </div>
      <div class="field">
        <label>横位置</label>
        <select id="alignH"><option value="left">左</option><option value="center" selected>中央</option><option value="right">右</option></select>
      </div>
    </div>

    <div class="checkbox">
      <input type="checkbox" id="shadowOn" />
      <label for="shadowOn">縁取り / 影をつける</label>
    </div>
    <div class="field" id="shadowField" style="display:none;">
      <label>影の色</label>
      <input type="color" id="shadowColor" value="#000000" />
      <label style="margin-top:8px;">ぼかし / 太さ <span class="val" id="shadowSizeVal">4</span></label>
      <input type="range" id="shadowSize" min="0" max="20" step="1" value="4" />
    </div>

    <div class="field">
      <label>背景</label>
      <select id="bgMode">
        <option value="transparent">透過 (OBS用)</option>
        <option value="solid">単色</option>
      </select>
    </div>
    <div class="field" id="bgColorField">
      <label>全体の背景色</label>
      <input type="color" id="bgColor" value="#000000" />
    </div>

    <div class="checkbox">
      <input type="checkbox" id="panelOn" />
      <label for="panelOn">文字の背後に半透明パネル（視認性UP）</label>
    </div>
    <div class="field" id="panelBgField" style="display:none;">
      <label>パネル色</label>
      <input type="color" id="panelColor" value="#000000" />
      <label style="margin-top:8px;">パネルの不透明度 <span class="val" id="panelOpacityVal">0.4</span></label>
      <input type="range" id="panelOpacity" min="0" max="1" step="0.05" value="0.4" />
    </div>

    <div class="checkbox">
      <input type="checkbox" id="checker" />
      <label for="checker">透過確認用の市松模様を表示（編集中のみ）</label>
    </div>

    <hr />

    <div class="field">
      <label>時刻同期</label>
      <p class="hint" id="syncStatus">同期中…</p>
      <button class="action" id="resync">今すぐ同期</button>
    </div>

    <div class="btn-row">
      <button class="action" id="copyUrl">設定付きURLをコピー</button>
      <button class="action" id="reset">リセット</button>
    </div>
    <p class="hint" style="margin-top:14px;">
      OBS → ソース → ブラウザ → このページのURLを指定。「カスタムCSS」は空でOK。透過はそのまま反映されます。
    </p>
  </div>

<script>
/*!
 * TimeSync — browser-only, dependency-free HTTP "NTP-like" clock corrector.
 * SNTP-style midpoint offset estimate; never throws; degrades to local clock.
 */
var TimeSync = (function () {
  "use strict";
  var offsetMs = 0, rttMs = Infinity, source = "local";
  var syncedAt = null, synced = false, timer = null, inFlight = null;
  var updateCbs = [];
  var MAX_RTT = 2000, FETCH_TIMEOUT = 3500;

  function parseCfTrace(text) {
    var m = /(?:^|\n)ts=([0-9.]+)/.exec(text);
    if (!m) return NaN;
    return Math.round(parseFloat(m[1]) * 1000);

    $("timerFinishLabel").value = state.timerFinishLabel;

    $("timerColorY").value = state.timerColorY;
    $("timerOvertime").checked = state.timerOvertime;
    $("progressBar").checked = state.progressBar;
    $("progressColor").value = state.progressColor;
    $("progressThick").value = state.progressThick; $("progressThickVal").textContent = state.progressThick;
    $("swShowMs").checked = state.swShowMs;

    $("target").value = state.target;
    $("cdTitle").value = state.cdTitle;
    $("cdDone").value = state.cdDone;
    $("cdDropDays").checked = state.cdDropDays;

    $("color").value = state.color;
    $("size").value = state.size; $("sizeVal").textContent = state.size;
    $("font").value = state.font;
    $("monoDigits").checked = state.monoDigits;
    $("weight").value = state.weight; $("weightVal").textContent = state.weight;
    $("letter").value = state.letter; $("letterVal").textContent = state.letter;
    $("opacity").value = state.opacity; $("opacityVal").textContent = state.opacity;
    $("blink").checked = state.blink;
    $("alignV").value = state.alignV; $("alignH").value = state.alignH;
    $("shadowOn").checked = state.shadowOn;
    $("shadowColor").value = state.shadowColor;
    $("shadowSize").value = state.shadowSize; $("shadowSizeVal").textContent = state.shadowSize;
    $("bgMode").value = state.bgMode;
    $("bgColor").value = state.bgColor;
    $("panelOn").checked = state.panelOn;
    $("panelColor").value = state.panelColor;
    $("panelOpacity").value = state.panelOpacity; $("panelOpacityVal").textContent = state.panelOpacity;
    $("checker").checked = state.checker;

    $("shadowField").style.display = state.shadowOn ? "" : "none";
    $("panelBgField").style.display = state.panelOn ? "" : "none";
    applyModeVisibility();
    renderSwLaps();
  }

  function bind(id, key, opts) {
    opts = opts || {};
    var el = $(id);
    el.addEventListener(opts.event || "input", function () {
      var v;
      if (el.type === "checkbox") v = el.checked;
      else if (typeof DEFAULTS[key] === "number") v = parseFloat(el.value);
      else v = el.value;
      state[key] = v;
      if (opts.valLabel) $(opts.valLabel).textContent = v;
      if (opts.onChange) opts.onChange();
      applyStyles();
      save();
    });
  }

  bind("mode", "mode", { onChange: function () { timerReset(); applyModeVisibility(); } });
  bind("format", "format", { onChange: function () {
    $("fpsRow").style.display = state.format === "HMSf" ? "" : "none";
    $("decimalsField").style.display = state.format === "HMSms" ? "" : "none";
  }});
  bind("fps", "fps");
  bind("decimals", "decimals");
  bind("hour24", "hour24");
  bind("padHour", "padHour");
  bind("showDate", "showDate", { onChange: function () {
    $("dateFormatField").style.display = state.showDate ? "" : "none";
  }});
  bind("dateFormat", "dateFormat");
  bind("tz", "tz");

  bind("timerH", "timerH"); bind("timerM", "timerM"); bind("timerS", "timerS");
  bind("timerShowMs", "timerShowMs");
  bind("timerFinishFlash", "timerFinishFlash");
  bind("timerBeep", "timerBeep", { onChange: ensureAudio });
  bind("timerFinishColor", "timerFinishColor");
  bind("timerFinishLabel", "timerFinishLabel");
  bind("timerWarnY", "timerWarnY");
  bind("timerWarnR", "timerWarnR");
  bind("timerColorY", "timerColorY");
  bind("timerOvertime", "timerOvertime");
  bind("progressBar", "progressBar");
  bind("progressColor", "progressColor");
  bind("progressThick", "progressThick", { valLabel: "progressThickVal" });
  bind("swShowMs", "swShowMs");

  bind("target", "target");
  bind("cdTitle", "cdTitle");
  bind("cdDone", "cdDone");
  bind("cdDropDays", "cdDropDays");

  bind("color", "color");
  bind("size", "size", { valLabel: "sizeVal" });
  bind("font", "font");
  bind("monoDigits", "monoDigits");
  bind("weight", "weight", { valLabel: "weightVal" });
  bind("letter", "letter", { valLabel: "letterVal" });
  bind("opacity", "opacity", { valLabel: "opacityVal" });
  bind("blink", "blink");
  bind("alignV", "alignV");
  bind("alignH", "alignH");
  bind("shadowOn", "shadowOn", { onChange: function () { $("shadowField").style.display = state.shadowOn ? "" : "none"; } });
  bind("shadowColor", "shadowColor");
  bind("shadowSize", "shadowSize", { valLabel: "shadowSizeVal" });
  bind("bgMode", "bgMode");
  // 背景色を選んだら自動的に「単色」に切り替えて即反映（透過にはプルダウンで戻せる）
  bind("bgColor", "bgColor", { onChange: function () {
    if (state.bgMode !== "solid") { state.bgMode = "solid"; $("bgMode").value = "solid"; }
  }});
  bind("panelOn", "panelOn", { onChange: function () { $("panelBgField").style.display = state.panelOn ? "" : "none"; } });
  bind("panelColor", "panelColor");
  bind("panelOpacity", "panelOpacity", { valLabel: "panelOpacityVal" });
  bind("checker", "checker");

  // ボタン
  $("timerStart").addEventListener("click", timerStart);
  $("timerPause").addEventListener("click", timerPause);
  $("timerReset").addEventListener("click", timerReset);
  $("swStart").addEventListener("click", swStart);
  $("swPause").addEventListener("click", swPause);
  $("swReset").addEventListener("click", swReset);
  $("swLap").addEventListener("click", swLap);
  $("resync").addEventListener("click", function () { var b = $("resync"); b.textContent = "同期中…"; TimeSync.sync().then(function () { b.textContent = "今すぐ同期"; }); });

  // スウォッチ
  Array.prototype.forEach.call(document.querySelectorAll(".swatch"), function (sw) {
    sw.addEventListener("click", function () {
      state.color = sw.getAttribute("data-c"); $("color").value = state.color; applyStyles(); save();
    });
  });

  // パネル開閉 + ショートカット
  function togglePanel() { panel.classList.toggle("open"); }
  gear.addEventListener("click", togglePanel);
  document.addEventListener("keydown", function (e) {
    var typing = document.activeElement && /INPUT|SELECT|TEXTAREA|BUTTON/.test(document.activeElement.tagName);
    if ((e.key === "s" || e.key === "S") && !typing) { togglePanel(); return; }
    if (e.key === "Escape") { panel.classList.remove("open"); return; }
    if (typing) return;
    if (state.mode === "timer") {
      if (e.key === " ") { e.preventDefault(); timerRunning ? timerPause() : timerStart(); }
      else if (e.key === "r" || e.key === "R") { timerReset(); }
    } else if (state.mode === "stopwatch") {
      if (e.key === " ") { e.preventDefault(); swRunning ? swPause() : swStart(); }
      else if (e.key === "l" || e.key === "L") { swLap(); }
      else if (e.key === "r" || e.key === "R") { swReset(); }
    }
  });

  // URLコピー
  $("copyUrl").addEventListener("click", function () {
    var params = new URLSearchParams();
    Object.keys(DEFAULTS).forEach(function (k) {
      var v = state[k]; if (typeof v === "boolean") v = v ? "1" : "0";
      params.set(k, v);
    });
    var url = location.origin + location.pathname + "?" + params.toString();
    var btn = $("copyUrl");
    var done = function () { btn.textContent = "コピーしました ✓"; setTimeout(function () { btn.textContent = "設定付きURLをコピー"; }, 1500); };
    if (navigator.clipboard) navigator.clipboard.writeText(url).then(done, function () { prompt("URL", url); });
    else prompt("URL", url);
  });

  // リセット
  $("reset").addEventListener("click", function () {
    state = JSON.parse(JSON.stringify(DEFAULTS));
    timerReset(); swReset();
    syncControlsFromState(); applyStyles(); save();
  });

  // 同期ステータス表示
  TimeSync.onUpdate(function (st) {
    var el = $("syncStatus"); if (!el) return;
    if (!st.synced) { el.textContent = "ローカル時計（同期できませんでした）"; return; }
    var sign = st.offsetMs >= 0 ? "+" : "";
    el.textContent = "同期: " + st.source + " / 補正 " + sign + Math.round(st.offsetMs) + "ms (RTT " + Math.round(st.rttMs) + "ms)";
  });

  // ---- 起動 ----
  load();
  syncControlsFromState();
  applyStyles();
  TimeSync.start();
  tick();
})();
</script>
</body>
</html>
